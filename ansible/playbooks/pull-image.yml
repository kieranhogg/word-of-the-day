- name: Pull Docker Images
  hosts: all
  become: true
  tasks:
    - name: Pull the wotd image
      community.docker.docker_image:
        name: ghcr.io/kieranhogg/word-of-the-day
        tag: main
        source: pull
        force_source: true

    - name: Start wotd container
      community.docker.docker_container:
        name: api
        image: ghcr.io/kieranhogg/word-of-the-day:main
        state: started
        restart_policy: always
        ports:
          - "8000:8000"
        healthcheck:
          test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
          interval: 30s
          timeout: 10s
          retries: 3
