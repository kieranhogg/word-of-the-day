- hosts: all
  become: yes
  tasks:
    - name: Install prerequisites for Docker repository
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Map Ansible architecture to Debian architecture
      ansible.builtin.set_fact:
        dpkg_arch: >-
          {%- if ansible_architecture == 'x86_64' -%}amd64
          {%- elif ansible_architecture == 'aarch64' -%}arm64
          {%- else -%}{{ ansible_architecture }}
          {%- endif -%}

    - name: Ensure APT keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker official GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        # Notice the dynamic architecture, distribution, release, and the signed-by parameter
        repo: "deb [arch={{ dpkg_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
        update_cache: yes

    - name: Install Docker CE and related plugins
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
