<!doctype html>
<html lang="en" class="bg-gray-100 font-serif text-gray-900">
    <head>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.11/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        .schoolbell-regular {
        font-family: "Schoolbell", cursive;
        font-weight: 400;
        font-style: normal;
        }
    </style>
    </head>
    <body 
        class="schoolbell-regular min-h-screen flex flex-col bg-[radial-gradient(ellipse_at_center,_#fef9c3_0%,_#fefce8_70%)]"
        x-data="{
            show: 'wotd',
            toggles: false,
        }"
    >
        <div class="bg-gradient-to-b from-amber-300 to-amber-400 text-center shadow-lg">
        <h1 class="py-10 text-4xl text-white drop-shadow-lg">Word of the Day</h1>
        </div>
        <div class="flex-grow flex flex-col items-center justify-center w-full" x-data="formatDateWithOrdinal()">
        <p class="text-center pt-8 pb-3 text-lg text-amber-400 tracking-wide uppercase" x-text="date"></p>
        <div x-show="toggles" class="flex mb-5 p-2">
            <div class="flex-1 py-2 px-4 hover:bg-amber-200 hover:rounded-md hover:shadow-md">Easy</div>
            <div class="flex-1 py-2 px-4 bg-amber-200 border-2 border-amber-500 rounded-md shadow-md">Medium</div>
            <div class="flex-1 py-2 px-4 hover:bg-amber-200 hover:rounded-md hover:shadow-md">Hard</div>
            <div class="flex-1 py-2 px-4 hover:bg-amber-200 hover:rounded-md hover:shadow-md">Complex</div>
        </div>
        <div x-show="show === 'wotd'" x-data="getWord()">
            <template x-if="word">
                <div
                    class="relative rotate-[-1deg] border-l-4 border-amber-400 mx-auto max-w-sm rounded-xl bg-white px-10 py-6 shadow-xl">
                    <span class="absolute top-4 right-4 w-3 h-3 rounded-full bg-amber-400 block"></span>
                    <div class="schoolbell-regular text-8xl font-bold text-orange-500 pb-2" x-text="word.word"></div>
                    <p class="text-2xl italic text-gray-500">✨ <span x-text="word.definition"></span></p>
                    <hr class="border-amber-100 my-3">
                    <div class="flex gap-2 mt-3">
                        <span class="text-xs font-semibold bg-amber-100 text-amber-700 border border-amber-300 rounded-full px-3 py-1">
                            🌍 Nature
                        </span>
                        <span class="text-xs font-semibold bg-orange-100 text-orange-600 border border-amber-300 rounded-full px-3 py-1">
                            ⭐ Tricky
                        </span>
                    </div>
                </div>
            </template>
        </div>
        </div>
        <script>
            function getWord() {
                return {
                    word: null,
                    async init() {
                        const resp = await fetch('https://api.wotd.today/words/wotd/');
                        this.word = await resp.json();
                        return this.word;
                    }
                }
            }
            function formatDateWithOrdinal() {
                    return {
                        date: null,
                        async init() {
                        const date = new Date();
                        const weekday = { weekday: 'long' };
                        const month = {  month: 'long' };
                        const day = date.getDate();
                        let daySuffix;

                        switch (day) {
                            case 1:
                            case 21:
                            case 31:
                                daySuffix = 'st';
                                break;
                            case 2:
                            case 22:
                                daySuffix = 'nd';
                                break;
                            case 3:
                            case 23:
                                daySuffix = 'rd';
                                break;
                            default:
                                daySuffix = 'th';
                        }
                    this.date = `${date.toLocaleDateString('en-GB', weekday)} ${day}${daySuffix} ${date.toLocaleDateString('en-GB', month)} `;
                    return this.date;
                    }
                    }
                }
        </script>
        <div x-show="show==='wotd'" class="m-8">
            <img @click="show = 'instructions'" class="mx-auto text-center" src="images/siri-button.png" width="10%"/>
        </div>
        <div x-show="show==='instructions'">
            <img class="mx-auto text-center" src="images/siri.png" width="500" />
        </div>
    </body>
</html>
